<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Nastase Trim Shop</title>
<style>
/* ============ NASTASE BRAND TOKENS ============ */
:root{
  --blue:#0072CE; --blue-dark:#005AA3; --blue-tint:#E5F1FB;
  --grey:#333F48; --grey2:#7C878E; --lgrey:#D0D3D4; --bg:#F4F5F6;
  --hivis:#8BC53F; --hivis-dark:#5E8F1E; --hivis-tint:#EFF7E2;
  --red:#C7402D; --red-tint:#FBEAE7;
  --amber:#D98E04; --amber-tint:#FBF2DE;
  --green-ok:#2E7D32; --green-tint:#E6F2E7;
  --radius:10px; --tap:52px;
  --font-head:'Arial Narrow','Helvetica Neue Condensed','Roboto Condensed',Arial,sans-serif;
  --font-body:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  --font-num:'SF Mono','Roboto Mono',Consolas,'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:17px}
body{font-family:var(--font-body);color:var(--grey);background:var(--bg);min-height:100vh}
button{font-family:inherit;font-size:1rem;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:1.05rem;color:var(--grey)}
h1,h2,h3{font-family:var(--font-head);text-transform:uppercase;letter-spacing:.02em}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}

#app{max-width:900px;margin:0 auto;padding-bottom:90px}
.topbar{position:sticky;top:0;z-index:50;background:var(--grey);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:4px solid var(--lgrey)}
.topbar.req{border-bottom-color:var(--blue)}
.topbar.shop{border-bottom-color:var(--hivis)}
.topbar .brand{font-family:var(--font-head);font-weight:bold;font-size:1.1rem;text-transform:uppercase;letter-spacing:.04em;line-height:1.05;min-width:0}
.topbar .brand small{display:block;font-size:.6rem;letter-spacing:.2em;color:var(--lgrey);font-weight:normal}
.topbar .mode{margin-left:auto;font-family:var(--font-head);text-transform:uppercase;font-size:.78rem;padding:6px 10px;border-radius:6px;font-weight:bold;flex:none}
.mode.req{background:var(--blue);color:#fff}
.mode.shop{background:var(--hivis);color:#1E2A12}
.topbar .iconbtn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#fff;font-size:1.15rem;flex:none}
.topbar .iconbtn:active{background:rgba(255,255,255,.15)}
.wrap{padding:16px 14px}
.nlogo{width:32px;height:32px;flex:none}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;min-height:var(--tap);padding:12px 16px;border-radius:var(--radius);font-weight:700;font-size:1.05rem;text-align:center;user-select:none}
.btn:active{transform:scale(.985);filter:brightness(.93)}
.btn.primary{background:var(--blue);color:#fff}
.btn.shopmain{background:var(--hivis);color:#1E2A12}
.btn.ghost{background:#fff;border:2px solid var(--lgrey);color:var(--grey)}
.btn.ghost.blue{border-color:var(--blue);color:var(--blue)}
.btn.ghost.green{border-color:var(--hivis-dark);color:var(--hivis-dark)}
.btn.danger{background:var(--red-tint);color:var(--red);border:2px solid var(--red)}
.btn.block{width:100%}
.btn.sm{min-height:44px;font-size:.95rem;padding:8px 12px}
.btn[disabled]{opacity:.45;pointer-events:none}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}
.btnrow .btn{flex:1;min-width:130px}

.card{background:#fff;border:1px solid var(--lgrey);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.ordercard{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--lgrey);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(51,63,72,.06)}
.ordercard:active{background:#F7F9FA}
.ordercard .toprow{display:flex;align-items:baseline;gap:10px}
.ordercard .proj{font-weight:800;font-size:1.1rem;flex:1;min-width:0;overflow-wrap:anywhere}
.ordercard .meta{color:var(--grey2);font-size:.9rem;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.ordercard .flags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}

.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.st-received{background:#EDEFF0;color:var(--grey)}
.st-scheduled{background:var(--blue-tint);color:var(--blue-dark)}
.st-onhold{background:var(--amber-tint);color:var(--amber)}
.st-production{background:var(--hivis-tint);color:var(--hivis-dark)}
.st-ready{background:var(--green-tint);color:var(--green-ok)}
.st-done{background:var(--grey);color:#fff}
.st-cancelled{background:#EDEFF0;color:var(--grey2);text-decoration:line-through}
.fl-under{background:var(--red-tint);color:var(--red)}
.fl-over{background:var(--amber-tint);color:var(--amber)}
.fl-match{background:var(--green-tint);color:var(--green-ok)}
.fl-msg{background:var(--blue-tint);color:var(--blue-dark)}
.fl-late{background:var(--red);color:#fff}

.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
.fchip{flex:none;min-height:44px;padding:8px 14px;border-radius:999px;border:2px solid var(--lgrey);background:#fff;font-weight:700;font-size:.92rem;color:var(--grey);display:flex;align-items:center;gap:7px}
.fchip.on.req{background:var(--blue);border-color:var(--blue);color:#fff}
.fchip.on.shop{background:var(--hivis);border-color:var(--hivis);color:#1E2A12}
.fchip .cnt{font-family:var(--font-num);font-size:.82rem;background:rgba(0,0,0,.12);border-radius:999px;padding:1px 7px}

.field{margin-bottom:14px}
.field label{display:block;font-weight:700;font-size:.86rem;text-transform:uppercase;letter-spacing:.04em;color:var(--grey2);margin-bottom:5px}
.field input[type=text],.field input[type=date],.field input[type=time],.field input[type=number],.field select,.field textarea{
  width:100%;min-height:var(--tap);padding:10px 12px;border:2px solid var(--lgrey);border-radius:8px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.shopview .field input:focus,.shopview .field select:focus,.shopview .field textarea:focus{border-color:var(--hivis-dark)}
.field .hint{font-size:.85rem;color:var(--grey2);margin-top:4px;line-height:1.4}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
.req-mark{color:var(--red)}
.seg{display:flex;border:2px solid var(--lgrey);border-radius:10px;overflow:hidden;background:#fff}
.seg button{flex:1;min-height:var(--tap);font-weight:700;color:var(--grey2)}
.seg button.on{background:var(--blue);color:#fff}
.shopview .seg button.on{background:var(--hivis);color:#1E2A12}

.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.catbtn{background:#fff;border:2px solid var(--lgrey);border-radius:var(--radius);min-height:64px;padding:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;font-size:.94rem}
.catbtn:active{border-color:var(--blue);background:var(--blue-tint)}
.catbtn .sub{font-weight:400;font-size:.76rem;color:var(--grey2)}
.itembtn{background:#fff;border:2px solid var(--lgrey);border-radius:var(--radius);min-height:76px;padding:10px;display:flex;align-items:center;gap:12px;text-align:left;font-weight:700;width:100%;margin-bottom:8px}
.itembtn:active{border-color:var(--blue);background:var(--blue-tint)}
.itembtn .alias{display:block;font-weight:400;font-size:.8rem;color:var(--grey2)}
.profile-svg{width:52px;height:40px;stroke:var(--grey);stroke-width:3;fill:none;stroke-linecap:square;stroke-linejoin:miter;flex:none}

/* labeled trim diagrams */
.bigdiag{width:100%;max-width:360px;display:block;margin:2px auto 12px;background:#fff;border:1px dashed var(--lgrey);border-radius:10px}
.bigdiag .dp{stroke:var(--grey);stroke-width:6;fill:none;stroke-linecap:square;stroke-linejoin:miter}
.bigdiag .leader{stroke:var(--grey2);stroke-width:1.6}
.bigdiag .dlabel{font:700 15px var(--font-body);fill:var(--grey)}
.bigdiag .dimline{stroke:var(--grey2);stroke-width:1.6;stroke-dasharray:5 4}

.dimrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dimrow .dimlabel{flex:none;width:96px;font-weight:700;font-size:.95rem}
.fracinput{flex:1;display:flex;gap:6px;align-items:center}
.fracinput .whole{width:72px;min-height:var(--tap);text-align:center;font-family:var(--font-num);font-size:1.25rem;border:2px solid var(--lgrey);border-radius:8px;background:#fff}
.fracbtn{flex:1;min-height:var(--tap);border:2px solid var(--lgrey);border-radius:8px;background:#fff;font-family:var(--font-num);font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.fracbtn:active{border-color:var(--blue)}
.fracgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:6px 0}
.fracgrid button{min-height:54px;border:2px solid var(--lgrey);border-radius:8px;background:#fff;font-family:var(--font-num);font-size:1.1rem;font-weight:700}
.fracgrid button.on{background:var(--blue);border-color:var(--blue);color:#fff}
.lenrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.lenrow input{width:76px;min-height:var(--tap);text-align:center;font-family:var(--font-num);font-size:1.25rem;border:2px solid var(--lgrey);border-radius:8px;background:#fff}
.lenrow .unit{font-family:var(--font-num);font-size:1.15rem;color:var(--grey2)}

.li-card{background:#fff;border:2px solid var(--lgrey);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.li-card.active{border-color:var(--hivis);box-shadow:0 0 0 3px var(--hivis-tint)}
.li-head{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:13px;min-height:64px}
.li-head:active{background:#F7F9FA}
.li-head .name{font-weight:800;font-size:1.08rem}
.li-head .qtybox{text-align:right;flex:none}
.li-head .qtybox .big{font-family:var(--font-num);font-size:1.25rem;font-weight:700}
.li-head .qtybox .lbl{font-size:.7rem;color:var(--grey2);text-transform:uppercase;letter-spacing:.05em}
.li-body{border-top:1px solid var(--lgrey);padding:14px;background:#FCFDFB}
.activebanner{background:var(--hivis);color:#1E2A12;font-weight:800;text-transform:uppercase;font-size:.82rem;letter-spacing:.04em;padding:7px 13px}
.specline{font-family:var(--font-num);font-size:1rem;background:#fff;border:1px dashed var(--lgrey);border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.6;overflow-wrap:anywhere}
.runrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.runpill{display:flex;align-items:center;border:2px solid var(--lgrey);border-radius:8px;overflow:hidden;background:#fff}
.runpill .rq{font-family:var(--font-num);font-weight:700;font-size:1.05rem;padding:9px 12px;min-height:48px;display:flex;align-items:center;gap:6px}
.runpill .rq small{font-family:var(--font-body);font-weight:400;color:var(--grey2);font-size:.72rem}
.runpill .rx{min-width:44px;min-height:48px;border-left:1px solid var(--lgrey);color:var(--grey2);font-size:1.05rem;display:flex;align-items:center;justify-content:center}
.runpill .rx:active{background:var(--blue-tint)}
.logrow{display:flex;gap:8px;margin:6px 0 4px;flex-wrap:wrap}
.logrow input{width:104px;min-height:56px;text-align:center;font-family:var(--font-num);font-size:1.5rem;font-weight:700;border:2px solid var(--hivis-dark);border-radius:10px;background:#fff}
.logrow .bump{min-width:54px;min-height:56px;border:2px solid var(--lgrey);border-radius:10px;background:#fff;font-family:var(--font-num);font-weight:700;font-size:1.05rem}
.logrow .bump:active{background:var(--hivis-tint)}
.tally{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:1rem}
.tally .built{font-family:var(--font-num);font-size:1.5rem;font-weight:800}
.progress{height:10px;background:#EDEFF0;border-radius:999px;flex:1;overflow:hidden}
.progress i{display:block;height:100%;background:var(--hivis);border-radius:999px}
.progress i.over{background:var(--amber)}
.progress i.done{background:var(--green-ok)}

.msgthread{margin-top:6px}
.msg{max-width:88%;padding:10px 12px;border-radius:12px;margin-bottom:8px;font-size:.96rem;line-height:1.35;overflow-wrap:anywhere}
.msg .who{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin-bottom:2px}
.msg.shop{background:var(--hivis-tint);border:1px solid var(--hivis);margin-right:auto}
.msg.requester{background:var(--blue-tint);border:1px solid var(--blue);margin-left:auto}
.msgcompose{display:flex;gap:8px;margin-top:8px}
.msgcompose input{flex:1;min-width:0;min-height:var(--tap);border:2px solid var(--lgrey);border-radius:10px;padding:8px 12px}

.photorow{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.photorow img{width:104px;height:104px;object-fit:cover;border-radius:8px;border:1px solid var(--lgrey)}
.photorow img:active{opacity:.8}

.sheetback{position:fixed;inset:0;background:rgba(51,63,72,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;width:100%;max-width:900px;border-radius:16px 16px 0 0;padding:18px 16px calc(26px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;position:relative}
.sheet h3{margin-bottom:12px;font-size:1.15rem;padding-right:44px}
.sheet .closex{position:absolute;right:10px;top:10px;font-size:1.35rem;min-width:44px;min-height:44px}

.gate{min-height:100vh;background:var(--grey);color:#fff;display:flex;flex-direction:column;align-items:center;padding:36px 20px calc(20px + env(safe-area-inset-bottom))}
.gate h1{font-size:1.7rem;letter-spacing:.05em;text-align:center}
.gate .tag{color:var(--lgrey);letter-spacing:.26em;font-size:.7rem;text-transform:uppercase;margin-bottom:38px}
.rolebtns{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:620px}
@media(max-width:560px){.rolebtns{grid-template-columns:1fr}}
.rolebtn{border-radius:14px;padding:26px 16px;text-align:center;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.rolebtn .rname{font-family:var(--font-head);text-transform:uppercase;font-weight:800;font-size:1.45rem;letter-spacing:.04em}
.rolebtn .rdesc{font-size:.9rem;opacity:.92}
.rolebtn.req{background:var(--blue);color:#fff}
.rolebtn.shop{background:var(--hivis);color:#1E2A12}
.rolebtn:active{transform:scale(.98)}
.gate .foot{margin-top:auto;color:var(--grey2);font-size:.78rem;text-align:center;line-height:1.5;padding-top:28px}
.pinpad{display:grid;grid-template-columns:repeat(3,80px);gap:12px;justify-content:center;margin-top:18px}
.pinpad button{width:80px;height:68px;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-family:var(--font-num);font-size:1.55rem;font-weight:700}
.pinpad button:active{background:rgba(255,255,255,.28)}
.pindots{display:flex;gap:14px;justify-content:center;margin:24px 0 6px;min-height:18px}
.pindots i{width:16px;height:16px;border-radius:50%;border:2px solid #fff}
.pindots i.full{background:#fff}
.pinerr{color:#FF9C8A;min-height:24px;text-align:center;font-weight:700}

.empty{text-align:center;padding:44px 20px;color:var(--grey2)}
.empty .big{font-size:2.5rem;margin-bottom:10px}
.empty h3{color:var(--grey);margin-bottom:8px;font-size:1.15rem}
.empty p{max-width:420px;margin:0 auto 18px;line-height:1.5}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--grey);color:#fff;padding:12px 20px;border-radius:14px;font-weight:700;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;max-width:92vw;text-align:center;line-height:1.35}
#toast.show{opacity:1}
#offlinebanner{background:var(--amber-tint);color:var(--amber);font-weight:700;font-size:.85rem;text-align:center;padding:7px 12px;display:none}

.stickybar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--lgrey);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:60}
.stickybar .inner{max-width:900px;margin:0 auto;display:flex;gap:10px}
.stickybar .btn{flex:1}

.secHead{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.secHead h2{font-size:1.02rem;color:var(--grey);flex:none}
.secHead .rule{flex:1;height:2px;background:var(--lgrey)}
.kv{display:flex;gap:8px;font-size:.95rem;margin-bottom:4px}
.kv b{min-width:112px;color:var(--grey2);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.03em;padding-top:2px;flex:none}
.kv span{overflow-wrap:anywhere}

/* status control */
.statusbig{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 4px}
.statusbig .chip{font-size:.95rem;padding:8px 16px}
.statuslist button{display:flex;align-items:center;gap:12px;width:100%;min-height:60px;padding:10px 14px;border:2px solid var(--lgrey);border-radius:10px;background:#fff;margin-bottom:8px;text-align:left;font-weight:700;font-size:1.02rem}
.statuslist button:active{background:var(--hivis-tint);border-color:var(--hivis)}
.statuslist button.cur{border-color:var(--grey);background:#F1F3F4}
.statuslist .sdesc{font-weight:400;font-size:.82rem;color:var(--grey2);display:block}
.holdreasons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.holdreasons button{border:2px solid var(--lgrey);border-radius:999px;background:#fff;min-height:46px;padding:8px 14px;font-weight:700;font-size:.92rem}
.holdreasons button.on{background:var(--amber-tint);border-color:var(--amber);color:var(--amber)}

/* spreadsheet view */
.tablewrap{overflow-x:auto;background:#fff;border:1px solid var(--lgrey);border-radius:var(--radius);-webkit-overflow-scrolling:touch}
table.sheetv{border-collapse:collapse;width:100%;min-width:900px;font-size:.88rem}
table.sheetv th{position:sticky;top:0;background:var(--grey);color:#fff;text-align:left;padding:9px 10px;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none}
table.sheetv th .arr{opacity:.85;font-size:.8rem}
table.sheetv td{border-bottom:1px solid var(--lgrey);padding:8px 10px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
table.sheetv tr:active td{background:var(--blue-tint)}
.sheettools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sheettools select,.sheettools input{min-height:46px;border:2px solid var(--lgrey);border-radius:8px;padding:6px 10px;background:#fff}
.sheettools input{flex:1;min-width:140px}

/* wide layouts (kanban / spreadsheet / calendar) */
body.wide #app{max-width:none}
body.wide .wrap{padding:16px 18px}

/* kanban board */
.kbtools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.kb{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch}
.kbcol{flex:0 0 252px;background:#E9EBEC;border-radius:12px;padding:9px;min-height:120px}
.kbcol h4{font-family:var(--font-head);text-transform:uppercase;font-size:.8rem;letter-spacing:.05em;display:flex;align-items:center;gap:7px;margin:2px 4px 9px;color:var(--grey)}
.kbcol h4 .cnt{font-family:var(--font-num);font-size:.75rem;background:rgba(51,63,72,.12);border-radius:999px;padding:1px 7px;margin-left:auto}
.kbcol.dragover{outline:3px dashed var(--hivis);outline-offset:-3px;background:var(--hivis-tint)}
.kbcard{background:#fff;border:1px solid var(--lgrey);border-radius:9px;padding:9px 10px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 2px rgba(51,63,72,.08);width:100%;text-align:left;display:block;touch-action:none;user-select:none;-webkit-user-select:none}
.kbcard:active{cursor:grabbing;background:#F7F9FA}
.kbcard.dragging{opacity:.35}
.kbcard .kbtitle{font-weight:800;font-size:.95rem;line-height:1.25;overflow-wrap:anywhere}
.kbcard .kbmeta{font-size:.78rem;color:var(--grey2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.kbcard .flags{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}
.kbcard .flags .chip{font-size:.66rem;padding:2px 8px}
.kbempty{color:var(--grey2);font-size:.82rem;text-align:center;padding:14px 4px}
.kbghost{position:fixed;z-index:9999;pointer-events:none;opacity:.92;box-shadow:0 10px 28px rgba(51,63,72,.35);transform:scale(1.03);margin:0!important}
@media (max-width:600px){
  .kbcol{flex:0 0 82vw;max-width:340px}
  .kb{gap:10px;scroll-snap-type:x proximity}
  .kbcol{scroll-snap-align:start}
}

  const inch=(l.in||0), s=(l.s||0);
  if(inch||s||!l.ft) parts.push((inch?inch:'')+(inch&&s?' ':'')+(s?fracLabel(s):(inch?'':'0'))+'\u2033');
  return parts.join(' ');
}

/* ---------------- STATUS MODEL (v2 — per Chuck's workflow) ---------------- */
const STATUSES=[
 {id:'received',  label:'Order Received', desc:'Just in from the office — Randy hasn\u2019t looked yet'},
 {id:'scheduled', label:'Scheduled',      desc:'Reviewed — has an expected completion date'},
 {id:'onhold',    label:'On Hold',        desc:'Stopped — needs materials, info, or run tracking'},
 {id:'production',label:'In Production',  desc:'On the brake right now'},
 {id:'ready',     label:'Ready To Ship',  desc:'Built, checked, staged for pickup/delivery'},
 {id:'done',      label:'Done',           desc:'Delivered or picked up — closed out'},
 {id:'cancelled', label:'Cancelled',      desc:'Killed by the office — kept for the record'},
];
const ST_LABEL={}; STATUSES.forEach(s=>ST_LABEL[s.id]=s.label);
function totalBuilt(li){ return (li.runs||[]).reduce((a,r)=>a+(r.qty||0),0) }
function liFlag(li){ const b=totalBuilt(li); if(b===0)return null;
  if(b<li.qtyOrdered)return 'under'; if(b>li.qtyOrdered)return 'over'; return 'match' }
function hasOpenQuestion(o){ return o.lineItems.some(li=>{const m=li.messages||[];return m.length&&m[m.length-1].from==='shop'}) }
function hasNewReply(o){ return o.lineItems.some(li=>{const m=li.messages||[];return m.length&&m[m.length-1].from==='requester'}) }
function isLate(o){ return !['done','cancelled'].includes(o.status)&&o.dueDate&&o.dueDate<today() }
function orderLF(o){ return o.lineItems.reduce((a,li)=>a+(li.qtyOrdered||0)*lenInches(li.len)/12,0) }
function orderBuiltLF(o){ return o.lineItems.reduce((a,li)=>a+totalBuilt(li)*lenInches(li.len)/12,0) }

/* migrate v1 orders (per-line status model) to v2 */
function migrateOrder(o){
  if(!o)return o;
  o.lineItems=o.lineItems||[];
  o.lineItems.forEach(li=>{
    if(!li.len) li.len={ft:(li.lengthFt||10), in:0, s:0};
    if(!li.material) li.material = ({'PAC-Clad':'Pre-finished Steel (PAC-Clad)','Trim Coil (Ply Gem)':'Pre-finished Trim Coil / Coil Stock','Mild Steel (stock)':'Mild Steel','Aluminum (stock)':'Aluminum'})[o.metalBrand] || o.metalBrand || 'Pre-finished Steel (PAC-Clad)';
    (li.runs||[]).forEach(r=>{ if(r.by===undefined) r.by='' });
    if(li.built===undefined) li.built=['complete','qc','ready','done'].includes(li.status);
    if(li.colorSide===undefined) li.colorSide='';
    li.runs=li.runs||[]; li.messages=li.messages||[]; li.photos=li.photos||[];
  });
  if(!o.status){
    if(o.cancelled) o.status='cancelled';
    else{ const sts=o.lineItems.map(li=>li.status||'queued');
      if(o.deliveredBy&&sts.every(s=>s==='done'))o.status='done';
      else if(sts.every(s=>['ready','done'].includes(s)))o.status='ready';
      else if(sts.some(s=>s!=='queued'))o.status='production';
      else o.status='received'; }
  }
  o.statusHistory=o.statusHistory||[];
  if(o.readyAcked===undefined) o.readyAcked = o.status!=='ready';
  return o;
}

function summarize(o){ return { id:o.id, num:o.num, projectName:o.projectName, gcClient:o.gcClient, requesterName:o.requesterName,
  dueDate:o.dueDate, orderDate:o.orderDate, fulfillment:o.fulfillment, status:o.status,
  scheduledFor:o.scheduledFor||'', scheduledTime:o.scheduledTime||'', holdReason:o.holdReason||'',
  items:o.lineItems.length, pieces:o.lineItems.reduce((a,l)=>a+(l.qtyOrdered||0),0),
  lf:Math.round(orderLF(o)*10)/10,
  openQ:hasOpenQuestion(o), newReply:hasNewReply(o), late:isLate(o),
  readyAlert:o.status==='ready'&&!o.readyAcked,
  under:o.lineItems.some(li=>li.built&&liFlag(li)==='under') } }

async function persistOrder(o){
  const okOrder=await ssave(OK(o.id),o,true);
  const idx=await sload(KEY_INDEX,true) || INDEX;
  const i=idx.orders.findIndex(x=>x.id===o.id);
  const sum=summarize(o);
  if(i>=0) idx.orders[i]=sum; else idx.orders.unshift(sum);
  if(o.num>=idx.seq) idx.seq=o.num+1;
  INDEX=idx;
  const okIdx=await ssave(KEY_INDEX,idx,true);
  if(!okOrder||!okIdx) toast('\u26A0 Couldn\u2019t save. If you\u2019re offline, get back online and hit save again.');
  else ALLORDERS=null; // invalidate spreadsheet cache
  return okOrder&&okIdx;
}
async function loadOrder(id){ const o=await sload(OK(id),true); return migrateOrder(o) }
async function refreshIndex(){ const idx=await sload(KEY_INDEX,true); if(idx) INDEX=idx }

/* ---------------- photos ---------------- */
function pickPhoto(cb){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.style.position='fixed'; inp.style.left='-9999px'; document.body.appendChild(inp); // iOS Safari needs it in the DOM
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; document.body.removeChild(inp); if(!f)return;
    toast('Loading photo…');
    const rd=new FileReader();
    rd.onerror=()=>toast('\u26A0 Couldn\u2019t read that photo — try another one.');
    rd.onload=()=>{ const img=new Image();
      img.onerror=()=>toast('\u26A0 That file isn\u2019t a photo this browser can open.');
      img.onload=()=>{
        try{
          const max=1000; let w=img.width,h=img.height;
          if(Math.max(w,h)>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k)}
          const c=document.createElement('canvas');c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          cb(c.toDataURL('image/jpeg',.7));
        }catch(e){ cb(rd.result) } // canvas blocked? store original
      };
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}
async function savePhoto(dataUrl){ const id=uid(); const ok=await rawSet(PK(id),dataUrl,true); if(!ok){toast('\u26A0 Photo didn\u2019t save — storage is full or offline.');return null} photoCache[id]=dataUrl; return id }

  if(noColor.length)missing.push('color on: '+noColor.map(l=>l.name).join(', '));
  const noColorSide=dv.lineItems.filter(l=>!l.colorSide);

  const noQty=dv.lineItems.filter(l=>!l.qtyOrdered);
  if(noQty.length)missing.push('quantity on: '+noQty.map(l=>l.name).join(', '));
  const badLen=dv.lineItems.filter(l=>lenInches(l.len)<=0||lenInches(l.len)>MAX_STICK_IN);

/* ---- Kanban drag & drop via Pointer Events — works with mouse AND touch.
   Native HTML5 drag/drop (dragstart/dragover/drop) doesn't work on most
   touchscreens, which is why the board used to fall back to a tab list on
   phones/tablets. This unifies both into one path: press and hold a card
   (or click-and-drag with a mouse) to pick it up; a quick tap/click opens it. */
let KB_DRAG=null;
const KB_HOLD_MS=260, KB_MOVE_CANCEL=10;
window.kbPointerDown=function(ev,id){
  if(ev.pointerType==='mouse' && ev.button!==0) return;
  const el=document.getElementById('kb-'+id);
  if(!el) return;
  const st={id, el, startX:ev.clientX, startY:ev.clientY, active:false, ghost:null};
  st._move=e=>kbPointerMove(e); st._up=e=>kbPointerUp(e); st._cancel=()=>kbCancel();
  KB_DRAG=st;
  st.timer=setTimeout(()=>kbActivate(),ev.pointerType==='mouse'?0:KB_HOLD_MS);
  window.addEventListener('pointermove',st._move,{passive:false});
  window.addEventListener('pointerup',st._up);
  window.addEventListener('pointercancel',st._cancel);
};
function kbActivate(){
  const st=KB_DRAG; if(!st) return;
  st.active=true; st.el.classList.add('dragging'); st.el.dataset.dragging='1';
  if(navigator.vibrate) try{ navigator.vibrate(12) }catch(e){}
  const r=st.el.getBoundingClientRect();
  const ghost=st.el.cloneNode(true); ghost.classList.add('kbghost');
  ghost.style.width=r.width+'px'; ghost.style.left=r.left+'px'; ghost.style.top=r.top+'px';
  document.body.appendChild(ghost); st.ghost=ghost;
  st.offX=st.startX-r.left; st.offY=st.startY-r.top;
}
function kbPointerMove(ev){
  const st=KB_DRAG; if(!st) return;
  const dx=ev.clientX-st.startX, dy=ev.clientY-st.startY;
  if(!st.active){
    if(Math.abs(dx)>KB_MOVE_CANCEL||Math.abs(dy)>KB_MOVE_CANCEL) kbCancel();
    return;
  }
  ev.preventDefault();
  st.ghost.style.left=(ev.clientX-st.offX)+'px';
  st.ghost.style.top=(ev.clientY-st.offY)+'px';
  document.querySelectorAll('.kbcol.dragover').forEach(c=>c.classList.remove('dragover'));
  const under=document.elementFromPoint(ev.clientX,ev.clientY);
  const col=under&&under.closest('.kbcol');
  if(col) col.classList.add('dragover');
  st.overCol=col;
}
async function kbPointerUp(){
  const st=KB_DRAG; if(!st) return;
  clearTimeout(st.timer);
  window.removeEventListener('pointermove',st._move);
  window.removeEventListener('pointerup',st._up);
  window.removeEventListener('pointercancel',st._cancel);
  document.querySelectorAll('.kbcol.dragover').forEach(c=>c.classList.remove('dragover'));
  if(!st.active){ KB_DRAG=null; return; } // short tap — the onclick handler opens the order
  if(st.ghost) st.ghost.remove();
  st.el.classList.remove('dragging');
  const el=st.el, col=st.overCol; KB_DRAG=null;
  setTimeout(()=>{ delete el.dataset.dragging }, 80); // outlast the synthetic click that follows pointerup
  if(col){
    const newStatus=col.getAttribute('data-status');
    if(newStatus){
      const o=await loadOrder(st.id);
      if(!o){toast('\u26A0 Couldn\u2019t load that order.');return}
      if(o.status!==newStatus){ CUR=o; pickStatus(newStatus); } // same prompts as the dropdown
    }
  }
}
function kbCancel(){
  const st=KB_DRAG; if(!st) return;
  clearTimeout(st.timer);
  window.removeEventListener('pointermove',st._move);
  window.removeEventListener('pointerup',st._up);
  window.removeEventListener('pointercancel',st._cancel);
  if(st.active&&st.ghost) st.ghost.remove();
  if(st.active) st.el.classList.remove('dragging');
  KB_DRAG=null;
}

window.openStatusSheet=function(){
  const o=CUR;
  mountSheet(`<button class="closex" onclick="closeSheet()">✕</button><h3>Move Order #${o.num} to…</h3>
    <div class="statuslist">
    ${STATUSES.map(s=>`<button class="${s.id===o.status?'cur':''}" onclick="pickStatus('${s.id}')">
      <span class="chip st-${s.id}">${s.label}</span>
      <span style="flex:1"><span class="sdesc">${s.desc}</span></span>
      ${s.id===o.status?'<span style="color:var(--grey2);font-size:.8rem">current</span>':''}
    </button>`).join('')}
    </div>`);
};
window.pickStatus=function(st){
  const o=CUR;
  if(st===o.status){closeSheet();return}
  if(st==='scheduled'){
    mountSheet(`<button class="closex" onclick="closeSheet()">✕</button><h3>Schedule Order #${o.num}</h3>
      <div class="hint" style="margin-bottom:12px">When do you expect this order to be built and done?</div>
      <div class="grid2">
        <div class="field"><label>Expected completion date <span class="req-mark">*</span></label>
          <input type="date" id="schedDate" value="${esc(o.scheduledFor||o.dueDate||'')}"></div>
        <div class="field"><label>Time (optional)</label>
          <input type="time" id="schedTime" value="${esc(o.scheduledTime||'')}"></div>
      </div>
      <button class="btn shopmain block" onclick="confirmSchedule()">✓ Schedule it</button>`);
    return;
  }
  if(st==='onhold'){
    const reasons=['Materials on order','Additional info needed','Large PO — run tracking','Machine down','Other'];
    mountSheet(`<button class="closex" onclick="closeSheet()">✕</button><h3>Put Order #${o.num} on hold</h3>
      <div class="hint" style="margin-bottom:10px">Why is it stopped? Everyone in the office will see this reason. <b>A reason is required.</b></div>
      <div class="holdreasons" id="holdreasons">
        ${reasons.map(r=>`<button onclick="pickHoldReason(this,'${esc(r)}')">${r}</button>`).join('')}
      </div>
      <div class="field"><label>Note (what are we waiting on?)</label>
        <input type="text" id="holdNote" placeholder="e.g. waiting on Iron Ore coil, ETA Friday"></div>
      <button class="btn shopmain block" onclick="confirmHold()">⏸ Put on hold</button>`);
    return;
  }
  if(st==='ready'){
    const noPhotos=!o.lineItems.some(li=>(li.photos||[]).length);
    const under=o.lineItems.filter(li=>totalBuilt(li)<li.qtyOrdered);
    const warns=[];
    if(under.length)warns.push('Short counts on: '+esc(under.map(l=>l.name+' ('+totalBuilt(l)+'/'+l.qtyOrdered+')').join(', ')));
    if(noPhotos)warns.push('No finished photo attached \u2014 a photo saves arguments later.');
    if(warns.length){ closeSheet();
      askConfirm(warns.join('<br><br>'),'Mark Ready anyway',()=>applyStatus('ready'),{title:'Heads up',noLabel:'Not yet'});
      return; }
    applyStatus('ready'); return;
  }
  if(st==='done'){ closeSheet(); doDoneFlow(); return; }
  if(st==='cancelled'){ closeSheet();
    askConfirm('Cancel order #'+o.num+'? It stays on the books under the Cancelled tab \u2014 nothing gets deleted.','Cancel this order',()=>applyStatus('cancelled'),{danger:1,noLabel:'Keep it open'});
    return; }
  applyStatus(st); // received / production — no extra input
};
let _holdReason='';
window.pickHoldReason=function(btn,r){ _holdReason=r;
  document.querySelectorAll('#holdreasons button').forEach(b=>b.classList.remove('on')); btn.classList.add('on') };
window.confirmHold=function(){
  const note=($('#holdNote').value||'').trim();
  if(!_holdReason){toast('Pick a reason — the office needs to know why it\u2019s stopped.');return}
  if(_holdReason==='Other'&&!note){toast('"Other" needs a note explaining why.');return}
  CUR.holdReason=_holdReason; CUR.holdNote=note; _holdReason='';
  applyStatus('onhold', CUR.holdReason+(note?': '+note:''));
};
window.confirmSchedule=function(){
  const dt=$('#schedDate').value;
  if(!dt){toast('Pick the expected completion date.');return}
  CUR.scheduledFor=dt; CUR.scheduledTime=$('#schedTime').value||'';
  applyStatus('scheduled','Expected '+fmtDate(dt)+(CUR.scheduledTime?' '+CUR.scheduledTime:''));
};
async function applyStatus(st,note){
  CUR.status=st;
  if(st==='ready') CUR.readyAcked=false;
  if(st!=='onhold'){CUR.holdReason='';CUR.holdNote=''}
  CUR.statusHistory=CUR.statusHistory||[];
  CUR.statusHistory.push({to:st,at:Date.now(),note:note||''});
  closeSheet(); const ok=await persistOrder(CUR); render();
  if(ok)toast('Order #'+CUR.num+' → '+ST_LABEL[st]+' ✓');
}
function topRunBy(o){
  const tally={};
  o.lineItems.forEach(li=>(li.runs||[]).forEach(r=>{ if(r.by)tally[r.by]=(tally[r.by]||0)+r.qty }));
  let best=''; let n=0;
  for(const k in tally){ if(tally[k]>n){n=tally[k];best=k} }
  return best;
}
window.doDoneFlow=function(){
  const o=CUR;
  mountSheet(`<button class="closex" onclick="closeSheet()">✕</button><h3>Close out Order #${o.num}</h3>
    <div class="field"><label>Shop tech (who built it) <span class="req-mark">*</span></label>

};
window.confirmDone=async function(){

  if(!tech){toast('Shop tech name is required.');return}
  if(!del){toast('Who '+(CUR.fulfillment==='pickup'?'picked it up':'delivered it')+'? Name required.');return}
  const finish=()=>{

  };

    </div>

      <div class="progress"><i class="${built>li.qtyOrdered?'over':built===li.qtyOrdered&&built>0?'done':''}" style="width:${pct}%"></i></div></div>

    ${ROLE==='shop'&&!locked?`
      <div class="runrow">${runs||'<span style="color:var(--grey2)">No runs logged yet</span>'}</div>
      <div class="logrow">
        <button class="bump" onclick="bumpRun(-1)">−1</button>

    `:`<div class="runrow">${runs||'<span style="color:var(--grey2)">Shop hasn\u2019t started this one yet</span>'}</div>`}

    ${(li.photos||[]).length?`<div><b style="font-size:.85rem;text-transform:uppercase;color:var(--grey2)">Finished photos</b>

window.toggleBuilt=function(i){
  const li=CUR.lineItems[i];
  if(!li.built){
    const built=totalBuilt(li);
    if(built===0){toast('Log at least one run first.');return}
    if(built<li.qtyOrdered){
      askConfirm(`Only <b>${built} of ${li.qtyOrdered}</b> logged on ${esc(li.name)}. Mark it built anyway? The office will see a SHORT flag.`,'Mark built short',()=>finishBuilt(i,true),{noLabel:'Keep running'});
      return; }
    finishBuilt(i,true);
  } else finishBuilt(i,false);
};
async function finishBuilt(i,val){
  const li=CUR.lineItems[i]; li.built=val;
  if(val && CUR.lineItems.every(l=>l.built) && !['done','cancelled','ready'].includes(CUR.status)){
    CUR.status='ready';
    CUR.statusHistory.push({to:'ready',at:Date.now(),note:'auto \u2014 all pieces built'});
    await persistOrder(CUR); render();
    toast('All pieces built \u2014 Order #'+CUR.num+' moved to Ready To Ship \u2713');
    return;
  }
  if(!val && CUR.status==='ready'){
    CUR.status='production';
    CUR.statusHistory.push({to:'production',at:Date.now(),note:'auto \u2014 piece reopened'});
  }
  await persistOrder(CUR); render();
}
window.bumpRun=n=>{const inp=$('#runinp');if(inp)inp.value=Math.max(0,(parseInt(inp.value)||0)+n)};
window.logRun=async function(i){
  const inp=$('#runinp'); const q=parseInt(inp.value)||0;
  if(q<=0){toast('Enter how many pieces you ran.');return}
  const by=(($('#runby')||{}).value||'').trim();
  if(!by){toast('Who ran it? Put a name in \u201Cran by\u201D.');return}

  const li=CUR.lineItems[i];
  li.runs=li.runs||[]; li.runs.push({qty:q, at:Date.now(), by});
  if(CUR.status==='received'||CUR.status==='scheduled'){ CUR.status='production'; CUR.statusHistory.push({to:'production',at:Date.now(),note:'auto — first run logged'}) }

};

window.openCalendar=async function(){
  const n=new Date(); if(!CAL)CAL={y:n.getFullYear(),m:n.getMonth()};
  await refreshIndex(); VIEW={name:'cal'}; render();
};
window.calShift=function(d){
  if(d===0){const n=new Date();CAL={y:n.getFullYear(),m:n.getMonth()}}
  else{ CAL.m+=d; if(CAL.m<0){CAL.m=11;CAL.y--} if(CAL.m>11){CAL.m=0;CAL.y++} }
  render();
};
function renderCalendar(){
  const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(CAL.y,CAL.m,1);
  const startDow=first.getDay();
  const daysIn=new Date(CAL.y,CAL.m+1,0).getDate();
  const prevDays=new Date(CAL.y,CAL.m,0).getDate();
  const tIso=today();
  const iso=(y,m,d)=>y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  const due={}, sched={};
  INDEX.orders.forEach(o=>{
    if(o.dueDate){(due[o.dueDate]=due[o.dueDate]||[]).push(o)}
    if(o.scheduledFor&&!['done','cancelled'].includes(o.status)){(sched[o.scheduledFor]=sched[o.scheduledFor]||[]).push(o)}
  });
  let cells='';
  const total=Math.ceil((startDow+daysIn)/7)*7;
  for(let c=0;c<total;c++){
    let y=CAL.y,m=CAL.m,d=c-startDow+1,other=false;
    if(d<1){ other=true; m=CAL.m-1; if(m<0){m=11;y--} d=prevDays+d }
    else if(d>daysIn){ other=true; d=d-daysIn; m=CAL.m+1; if(m>11){m=0;y++} }
    const ds=iso(y,m,d);
    const chips=(due[ds]||[]).map(o=>`<button class="calchip st-${o.status}" onclick="openOrder('${o.id}')" title="${esc(o.projectName)} — due">⚑ #${o.num} ${esc(o.projectName)}</button>`).join('')
      +(sched[ds]||[]).map(o=>`<button class="calchip sched" onclick="openOrder('${o.id}')" title="${esc(o.projectName)} — scheduled to finish${o.scheduledTime?' '+o.scheduledTime:''}">📅 #${o.num} ${esc(o.projectName)}${o.scheduledTime?' '+o.scheduledTime:''}</button>`).join('');
    cells+=`<div class="calcell ${other?'other':''} ${ds===tIso?'today':''}"><div class="dnum">${d}</div>${chips}</div>`;
  }
  app.innerHTML = topbar('Calendar','back') + `<div class="wrap">
    <div class="calhead">
      <button class="btn ghost sm" onclick="calShift(-1)">← Prev</button>
      <h2>${MO[CAL.m]} ${CAL.y}</h2>
      <button class="btn ghost sm" onclick="calShift(1)">Next →</button>
      <button class="btn ghost sm" onclick="calShift(0)">Today</button>
    </div>
    <div class="calgrid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x=>`<div class="caldow">${x}</div>`).join('')}
      ${cells}
    </div>
    <div class="callegend">
      <span>⚑ solid chip = <b>need-by date</b> (color = current status)</span>
      <span><span class="calchip sched" style="display:inline;padding:2px 8px">📅 dashed</span> = shop\u2019s expected completion</span>
      <span>Tap any chip to open the order.</span>
    </div>
  </div>
  <div id="sheetmount"></div>`;
}

window.importJSON=function(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.style.position='fixed';inp.style.left='-9999px';document.body.appendChild(inp);
  inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; document.body.removeChild(inp); if(!f)return;
    try{
      const txt=await f.text(); const b=JSON.parse(txt);
      if(!b.orders||!b.index)throw new Error('bad file');
      askConfirm('Import '+b.orders.length+' orders from this backup? Orders with the same # will be replaced.','Import',async()=>{ await doImport(b) },{noLabel:'Cancel'});
      return;
    }catch(e){ toast('\u26A0 Couldn\u2019t read that file \u2014 make sure it\u2019s a trimshop backup .json') }
  };
  inp.click();
};
async function doImport(b){
    try{
      const idx=await sload(KEY_INDEX,true)||{seq:1,orders:[]};
      for(const o of b.orders){ await ssave(OK(o.id),o,true);
        const i=idx.orders.findIndex(x=>x.id===o.id); const sum=summarize(migrateOrder(o));
        if(i>=0)idx.orders[i]=sum; else idx.orders.push(sum);
        if(o.num>=idx.seq)idx.seq=o.num+1; }
      idx.orders.sort((a,b2)=>b2.num-a.num);
      INDEX=idx; await ssave(KEY_INDEX,idx,true);
      for(const pid in (b.photos||{})){ await rawSet(PK(pid),b.photos[pid],true); photoCache[pid]=b.photos[pid] }
      ALLORDERS=null; await loadAllOrders(); render(); toast('Imported ✓ — '+b.orders.length+' orders');
    }catch(e){ toast('\u26A0 Couldn\u2019t import that backup.') }
}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a);
  a.click(); setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
}

/* =====================================================================
   AUTO-REFRESH + IN-APP ALERTS (both portals)
   Two refresh layers, both on by default:
   1. Supabase Realtime — pushes a change the instant it happens (needs
      Realtime turned on for kv_store in the Supabase dashboard).
   2. A 25s poll — a safety net that works even if step 1 isn't set up,
      or the realtime socket drops.
   On top of refresh, this block watches for things this device's role
   cares about (new orders / questions / replies / ready-for-pickup) and
   surfaces them three ways, no email or server needed:
   - a chime + toast the moment it happens
   - a browser Notification (if the user granted permission via the 🔔
     button in the top bar) — pops even if this tab isn't focused
   - a "(N)" counter on the browser tab title
   ===================================================================== */
let AUDIO_CTX=null;
document.addEventListener('pointerdown', function unlock(){ try{ if(!AUDIO_CTX) AUDIO_CTX=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} document.removeEventListener('pointerdown',unlock); }, {once:true});
function playChime(){
  try{
    if(!AUDIO_CTX) AUDIO_CTX=new (window.AudioContext||window.webkitAudioContext)();
    const ctx=AUDIO_CTX, t0=ctx.currentTime;
    [[880,t0],[1175,t0+.14]].forEach(([freq,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.25,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.32);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.34);
    });
  }catch(e){}
}

const BASE_TITLE='Nastase Trim Shop';

  if(!ROLE) return 0;
  const list=INDEX.orders.filter(s=>!['done','cancelled'].includes(s.status));

function notifyPermitted(){ return typeof Notification!=='undefined' && Notification.permission==='granted'; }
window.enableNotifications=async function(){
  if(typeof Notification==='undefined'){ toast('This browser doesn\u2019t support notifications.'); return; }
  if(Notification.permission==='granted'){ toast('Alerts are already on for this browser.'); return; }
  const perm=await Notification.requestPermission();
  toast(perm==='granted' ? '\uD83D\uDD14 Alerts on \u2014 you\u2019ll get a popup for new activity.' : 'Alerts stayed off — you can still see the (N) badge in this tab and the flags on each order.');
  render();
};
function fireNotification(title,body){
  if(!notifyPermitted()) return;
  try{ new Notification(title,{body,tag:'nastase-trim-shop'}); }catch(e){}
}

let KNOWN_STATE=null; // Map id -> {status, openQ, newReply}
function seedKnownOrders(){
  KNOWN_STATE=new Map(INDEX.orders.map(o=>[o.id,{status:o.status,openQ:o.openQ,newReply:o.newReply}]));
  updateTitleBadge();
}

let POLL_BUSY=false;
async function pollForNewOrders(){
  if(!SB_READY || POLL_BUSY) return;
  POLL_BUSY=true;
  try{
    const prevState=KNOWN_STATE;
    await refreshIndex();
    const newOnes = prevState ? INDEX.orders.filter(o=>!prevState.has(o.id)) : [];
    const becameReady = prevState ? INDEX.orders.filter(o=>{const p=prevState.get(o.id); return p&&p.status!=='ready'&&o.status==='ready'}) : [];
    const newQuestion = prevState ? INDEX.orders.filter(o=>{const p=prevState.get(o.id); return p&&!p.openQ&&o.openQ}) : [];
    const newReplyIn = prevState ? INDEX.orders.filter(o=>{const p=prevState.get(o.id); return p&&!p.newReply&&o.newReply}) : [];
    seedKnownOrders();

    if(ROLE==='shop'){
      if(newOnes.length){
        playChime();
        toast(newOnes.length===1 ? '\uD83D\uDD14 New order \u2014 #'+newOnes[0].num : '\uD83D\uDD14 '+newOnes.length+' new orders in');
        fireNotification('New trim order', newOnes.length===1?('Order #'+newOnes[0].num+' — '+newOnes[0].projectName):(newOnes.length+' new orders came in'));
      }
      if(newReplyIn.length){
        playChime();
        toast('\uD83D\uDCAC Office replied on order #'+newReplyIn[0].num+(newReplyIn.length>1?' (+'+(newReplyIn.length-1)+' more)':''));
        fireNotification('Office replied', newReplyIn.length===1?('Order #'+newReplyIn[0].num+' — '+newReplyIn[0].projectName):(newReplyIn.length+' orders have new replies'));
      }
    } else if(ROLE==='requester'){
      if(newQuestion.length){
        playChime();
        toast('\u2753 Shop asked a question on order #'+newQuestion[0].num+(newQuestion.length>1?' (+'+(newQuestion.length-1)+' more)':''));
        fireNotification('Shop has a question', newQuestion.length===1?('Order #'+newQuestion[0].num+' — '+newQuestion[0].projectName):(newQuestion.length+' orders have new questions'));
      }
      if(becameReady.length){
        playChime();
        toast('\uD83D\uDCE6 Order #'+becameReady[0].num+' is ready'+(becameReady.length>1?' (+'+(becameReady.length-1)+' more)':''));
        fireNotification('Order ready for pickup', becameReady.length===1?('Order #'+becameReady[0].num+' — '+becameReady[0].projectName):(becameReady.length+' orders are ready'));
      }
    }
    if(VIEW.name==='home') render();
  } finally { POLL_BUSY=false; }
}

function initRealtime(){
  seedKnownOrders();
  setInterval(pollForNewOrders, 25000); // safety-net poll, always on
  if(!SB_READY || !sb) return;
  try{
    sb.channel('kv_store-changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'kv_store'}, payload=>{
        const k=(payload.new&&payload.new.key)||(payload.old&&payload.old.key)||'';
        if(k===KEY_INDEX || k.indexOf(OK(''))===0) pollForNewOrders();
      })
      .subscribe();
  }catch(e){}
}

    </table>
    <div class="signrow">Shop Tech: <span class="signline">${esc(o.shopTech||'')}</span> &nbsp;&nbsp; Date completed: <span class="signline"></span></div>
    <div class="signrow">QC Check by: <span class="signline">${esc(o.qcBy||'')}</span> &nbsp;&nbsp; QC date: <span class="signline">${o.qcDate?fmtDate(o.qcDate):''}</span></div>
    <div class="signrow">${o.fulfillment==='pickup'?'Picked up by':'Delivered by'}: <span class="signline">${esc(o.deliveredBy||'')}</span> &nbsp;&nbsp; Date: <span class="signline">${o.deliveredDate?fmtDate(o.deliveredDate):''}</span></div>
    <div style="margin-top:14px;font-size:10px">Nastase Contracting Inc. | Metal Trim Shop | Internal use only — printed ${fmtDate(today())}</div>
  </div>`;
}

/* ---------------- boot ---------------- */
(async function(){
  app.innerHTML='<div class="empty" style="padding-top:120px"><h3>Loading…</h3></div>';
  try{
    if(!SB_READY){
      const b=$('#offlinebanner');
      b.textContent = (window.supabase)
        ? '\u26A0 Server isn\u2019t configured yet (paste your Supabase URL/key into the file) \u2014 running from a local copy on this device only.'
        : '\u26A0 Couldn\u2019t load the server library \u2014 check your internet connection. Running from a local copy on this device only.';
      b.style.display='block';
      if(!LS_OK){ b.textContent='\u26A0 This browser can\u2019t save data — anything you enter disappears when you close it.'; }
    }
    const savedBy=await sload('trimshop-runby',false);
    if(savedBy)RUNBY=savedBy;
    const savedRole=await sload('trimshop-device-role',false);
    if(savedRole==='shop'||savedRole==='requester')ROLE=savedRole;
    const idx=await sload(KEY_INDEX,true);
    if(idx)INDEX=idx;
  }catch(e){}
  render();
  initRealtime();
})();
</script>
</body>
</html>
